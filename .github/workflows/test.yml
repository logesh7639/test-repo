name: Day 1 - Hello GitHub Actions

on:
  push:
    branches:
      - main

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Hello
        run: echo "Hello GitHub Actions!"

      - name: Show Current Directory
        run: pwd

      - name: List Files
        run: ls -la
