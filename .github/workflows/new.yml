name: Runner Information

on:
  workflow_dispatch:

jobs:
  runner-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Show Runner Details
        run: |
          echo "Runner Name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Architecture: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"
