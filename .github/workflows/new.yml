name: Secret Demo

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Display Welcome Message
        run: echo "Welcome to GH-200 Security Lab"

      - name: Access Secret
        env:
          PASSWORD: ${{ secrets.MY_SECRET }}
        run: |
          echo "Secret is available."
          echo "GitHub automatically hides secret values."
