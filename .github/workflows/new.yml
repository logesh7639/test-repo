name: Day 6 - Secrets and Variables

on:
  workflow_dispatch:

env:
  COURSE_NAME: GH-200 Bootcamp

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Environment Variable
        run: |
          echo "Course: $COURSE_NAME"

      - name: Display Repository Variables
        run: |
          echo "Application: ${{ vars.APP_NAME }}"
          echo "Environment: ${{ vars.ENVIRONMENT }}"

      - name: Verify Secret Exists
        run: |
          echo "Secret loaded successfully."

      - name: Use Secret
        run: |
          echo "Password = ${{ secrets.MY_PASSWORD }}"

      - name: Display Runner Information
        run: |
          echo "Runner OS: ${{ runner.os }}"
          echo "Triggered by: ${{ github.actor }}"
