name: Day 5 Lab

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Application Name"
        required: true
        default: "inventory-api"
        type: string

      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

      deploy:
        description: "Deploy application?"
        required: true
        default: false
        type: boolean

jobs:
  deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Show Input Values
        run: |
          echo "App: ${{ inputs.app_name }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Deploy: ${{ inputs.deploy }}"

      - name: Deploy Application
        if: ${{ inputs.deploy }}
        run: echo "🚀 Deploying ${{ inputs.app_name }} to ${{ inputs.environment }}"
